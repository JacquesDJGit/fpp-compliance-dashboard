<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FPP Dashboard Login</title>
<link rel="stylesheet" href="styles.css">
</head>
<body class="auth-body">
<div class="top-bar"></div>
<main class="auth-wrapper">
  <section class="auth-card">
    <div class="auth-brand-pill">Secure Access</div>
    <h1>FPP Compliance Dashboard</h1>
    <p class="auth-subtitle">Sign in to access the dashboard.</p>
    <form id="login-form" class="auth-form">
      <label for="username">Username</label>
      <input id="username" name="username" type="text" autocomplete="username" required>

      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required>

      <button type="submit">Log In</button>
      <p id="login-error" class="auth-error" aria-live="polite"></p>
    </form>
    <p class="auth-note">Default login: <strong>admin</strong> / <strong>fpp123</strong></p>
  </section>
</main>
<script src="auth.js"></script>
</body>
</html>
